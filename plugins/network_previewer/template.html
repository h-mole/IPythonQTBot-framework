<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network View</title>
    <!-- BootCDN: vis-network -->
    <script src="https://cdn.bootcdn.net/ajax/libs/vis-network/9.1.6/dist/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        .toolbar {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }

        .toolbar-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: #e0e0e0;
            margin: 0 5px;
        }

        #network-container {
            flex: 1;
            position: relative;
            background: white;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 0;
        }

        #network {
            width: 100%;
            height: 100%;
            outline: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 加载状态 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #667eea;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误状态 */
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 40px;
            color: #e53935;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* 节点信息面板 */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: 300px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 50;
        }

        .info-panel.visible {
            display: block;
        }

        .info-panel h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .info-panel pre {
            font-size: 12px;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            color: #555;
        }

        .info-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
        }

        .info-panel .close-btn:hover {
            color: #333;
        }

        /* 图例 */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-height: 200px;
            overflow-y: auto;
        }

        .legend h4 {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
            font-size: 12px;
            color: #555;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* 搜索框 */
        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            width: 200px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #667eea;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }
            
            .toolbar {
                padding: 10px 15px;
            }
            
            #network-container {
                margin: 10px;
            }
            
            .info-panel {
                max-width: calc(100% - 40px);
                right: 10px;
                top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <div class="header-icon">🌐</div>
            <span id="page-title">Network View</span>
        </h1>
        <div class="stats">
            <span class="stat-item" id="node-count">0 节点</span>
            <span class="stat-item" id="edge-count">0 边</span>
        </div>
    </div>
    
    <div class="toolbar">
        <button class="toolbar-btn" onclick="fitNetwork()" title="适应窗口">
            🔍 适应窗口
        </button>
        <button class="toolbar-btn" onclick="resetZoom()" title="重置缩放">
            🔄 重置
        </button>
        <div class="toolbar-separator"></div>
        <button class="toolbar-btn" id="physics-btn" onclick="togglePhysics()" title="切换物理引擎">
            ⚡ 物理引擎
        </button>
        <button class="toolbar-btn" onclick="stabilize()" title="稳定布局">
            ⏸️ 稳定
        </button>
        <div class="toolbar-separator"></div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索节点..." onkeyup="searchNode(event)">
        </div>
    </div>

    <div id="network-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在加载网络图...</p>
        </div>
        <div id="network"></div>
        
        <div class="info-panel" id="info-panel">
            <button class="close-btn" onclick="closeInfoPanel()">×</button>
            <h3>节点信息</h3>
            <pre id="info-content"></pre>
        </div>
        
        <div class="legend" id="legend" style="display: none;">
            <h4>图例</h4>
            <div id="legend-content"></div>
        </div>
    </div>

    <script>
        let network = null;
        let nodesDataSet = null;
        let edgesDataSet = null;
        let graphData = null;
        let physicsEnabled = true;

        // 默认配色方案
        const colorPalette = [
            '#667eea', '#f093fb', '#f5576c', '#4facfe', '#00f2fe',
            '#43e97b', '#fa709a', '#fee140', '#30cfd0', '#a8edea',
            '#fed6e3', '#d299c2', '#fef9d7', '#8ec5fc', '#e0c3fc'
        ];

        // 加载网络图数据
        async function loadGraph() {
            try {
                const response = await fetch('api/graph');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                
                document.getElementById('page-title').textContent = data.title || 'Network View';
                graphData = data;
                
                renderNetwork(data.graph, data.options);
                
                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';
                
                // 更新统计
                updateStats(data.graph);
                
                // 显示图例
                showLegend(data.graph);
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <div class="error-icon">⚠️</div>
                        <h3>加载失败</h3>
                        <p>${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        }

        // 渲染网络图
        function renderNetwork(graph, customOptions = {}) {
            const container = document.getElementById('network');
            
            // 创建数据集
            nodesDataSet = new vis.DataSet(graph.nodes.map((node, idx) => {
                // 如果已经有 color 对象，直接使用
                if (node.color && typeof node.color === 'object' && node.color.background) {
                    // 确保有 highlight 配置
                    if (!node.color.highlight) {
                        node.color.highlight = {
                            background: node.color.background,
                            border: '#000000'
                        };
                    }
                    return node;
                }
                
                // 如果没有指定颜色，根据 group 自动分配
                if (!node.color && node.group) {
                    const groups = [...new Set(graph.nodes.map(n => n.group).filter(g => g))];
                    const groupIndex = groups.indexOf(node.group);
                    node.color = {
                        background: colorPalette[groupIndex % colorPalette.length],
                        border: colorPalette[groupIndex % colorPalette.length],
                        highlight: {
                            background: colorPalette[groupIndex % colorPalette.length],
                            border: '#333333'
                        }
                    };
                } else if (!node.color) {
                    // 默认颜色
                    node.color = {
                        background: '#667eea',
                        border: '#667eea',
                        highlight: {
                            background: '#667eea',
                            border: '#333333'
                        }
                    };
                }
                return node;
            }));
            
            edgesDataSet = new vis.DataSet(graph.edges);
            
            const data = {
                nodes: nodesDataSet,
                edges: edgesDataSet
            };
            
            // 默认选项
            const defaultOptions = {
                nodes: {
                    shape: 'dot',
                    size: 20,
                    font: {
                        size: 14,
                        color: '#333',
                        face: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
                    },
                    borderWidth: 2,
                    shadow: true
                },
                edges: {
                    width: 2,
                    color: {
                        color: '#ccc',
                        highlight: '#667eea',
                        hover: '#667eea'
                    },
                    smooth: {
                        type: 'continuous'
                    },
                    font: {
                        size: 12,
                        color: '#666',
                        align: 'middle'
                    }
                },
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -8000,
                        centralGravity: 0.3,
                        springLength: 150,
                        springConstant: 0.04,
                        damping: 0.09,
                        avoidOverlap: 0.5
                    },
                    stabilization: {
                        iterations: 200
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    hideEdgesOnDrag: true,
                    navigationButtons: true,
                    keyboard: true
                },
                layout: {
                    randomSeed: 2
                }
            };
            
            // 合并自定义选项
            const options = mergeDeep(defaultOptions, customOptions);
            
            // 创建网络图
            network = new vis.Network(container, data, options);
            
            // 绑定事件
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const node = nodesDataSet.get(nodeId);
                    showNodeInfo(node);
                } else {
                    closeInfoPanel();
                }
            });
            
            network.on("hoverNode", function (params) {
                container.style.cursor = 'pointer';
            });
            
            network.on("blurNode", function (params) {
                container.style.cursor = 'default';
            });
            
            // 稳定后适应窗口
            network.once("stabilizationIterationsDone", function() {
                network.fit({
                    animation: {
                        duration: 1000,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            });
        }

        // 深度合并对象
        function mergeDeep(target, source) {
            const output = Object.assign({}, target);
            if (isObject(target) && isObject(source)) {
                Object.keys(source).forEach(key => {
                    if (isObject(source[key])) {
                        if (!(key in target))
                            Object.assign(output, { [key]: source[key] });
                        else
                            output[key] = mergeDeep(target[key], source[key]);
                    } else {
                        Object.assign(output, { [key]: source[key] });
                    }
                });
            }
            return output;
        }

        function isObject(item) {
            return (item && typeof item === 'object' && !Array.isArray(item));
        }

        // 更新统计信息
        function updateStats(graph) {
            document.getElementById('node-count').textContent = `${graph.nodes.length} 节点`;
            document.getElementById('edge-count').textContent = `${graph.edges.length} 边`;
        }

        // 显示图例
        function showLegend(graph) {
            const groups = [...new Set(graph.nodes.map(n => n.group).filter(g => g))];
            if (groups.length === 0) return;
            
            const legendContent = document.getElementById('legend-content');
            legendContent.innerHTML = groups.map((group, idx) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colorPalette[idx % colorPalette.length]}"></div>
                    <span>${escapeHtml(group)}</span>
                </div>
            `).join('');
            
            document.getElementById('legend').style.display = 'block';
        }

        // 显示节点信息
        function showNodeInfo(node) {
            const panel = document.getElementById('info-panel');
            const content = document.getElementById('info-content');
            
            // 过滤掉 vis-network 内部使用的字段
            const displayData = {};
            for (const [key, value] of Object.entries(node)) {
                if (!['color', 'shape', 'font', 'borderWidth', 'shadow'].includes(key)) {
                    displayData[key] = value;
                }
            }
            
            content.textContent = JSON.stringify(displayData, null, 2);
            panel.classList.add('visible');
        }

        // 关闭信息面板
        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('visible');
        }

        // 适应窗口
        function fitNetwork() {
            if (network) {
                network.fit({
                    animation: {
                        duration: 1000,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        }

        // 重置缩放
        function resetZoom() {
            if (network) {
                network.moveTo({
                    scale: 1,
                    animation: {
                        duration: 500,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        }

        // 切换物理引擎
        function togglePhysics() {
            if (network) {
                physicsEnabled = !physicsEnabled;
                network.setOptions({ physics: { enabled: physicsEnabled } });
                document.getElementById('physics-btn').classList.toggle('active', physicsEnabled);
            }
        }

        // 稳定布局
        function stabilize() {
            if (network) {
                network.stabilize();
            }
        }

        // 搜索节点
        function searchNode(event) {
            if (event.key !== 'Enter') return;
            
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query || !network) return;
            
            const nodes = nodesDataSet.get();
            const found = nodes.find(node => 
                (node.label && node.label.toLowerCase().includes(query)) ||
                (node.id && String(node.id).toLowerCase().includes(query))
            );
            
            if (found) {
                network.focus(found.id, {
                    scale: 1.2,
                    animation: {
                        duration: 500,
                        easingFunction: 'easeInOutQuad'
                    }
                });
                network.selectNodes([found.id]);
                showNodeInfo(found);
            } else {
                alert('未找到匹配的节点');
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', loadGraph);
    </script>
</body>
</html>
